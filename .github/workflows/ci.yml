name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start PostgreSQL with pg_stat_statements
        run: |
          docker run -d --name pg \
            -e POSTGRES_USER=pgslow \
            -e POSTGRES_PASSWORD=pgslow \
            -e POSTGRES_DB=pgslow_test \
            -p 5432:5432 \
            postgres:16 \
            -c shared_preload_libraries=pg_stat_statements \
            -c pg_stat_statements.track=all
          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U pgslow -d pgslow_test >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec pg psql -U pgslow -d pgslow_test \
            -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          PGSLOW_TEST_DSN: postgresql://pgslow:pgslow@localhost:5432/pgslow_test
        run: pytest -v
